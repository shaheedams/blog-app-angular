@if(isLoading()){
<h1>Loading post ..</h1>
}@else {
<div class="cardPostContainer">
    <div class="conatiner">
        <div class="cardPost">
            <div class="title"><strong>Title :</strong> {{post()?.title}}</div>
            <div class="body"><strong>Body :</strong> {{post()?.body}}</div>
            <div class="user"><strong>User ID :</strong> {{post()?.userId}}</div>
        </div>
    </div>

</div>
}
